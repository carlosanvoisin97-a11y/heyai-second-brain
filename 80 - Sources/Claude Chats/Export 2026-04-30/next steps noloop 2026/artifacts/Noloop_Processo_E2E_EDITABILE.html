<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noloop — Processo E2E (Editabile)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%);
    font-family: 'DM Sans', sans-serif;
    color: #212529;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: #1A1A2E;
    padding: 28px 24px 22px;
    color: #fff;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 840px; margin: 0 auto; }
  .header-tag {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: #7C8DB0; margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header-sub { font-size: 13px; color: #ADB5BD; }

  /* Toolbar */
  .toolbar {
    max-width: 840px; margin: 0 auto; padding: 12px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
  }
  .toolbar-left { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6C757D; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .btn {
    font-size: 12px; font-weight: 600; color: #495057;
    background: #fff; border: 1px solid #DEE2E6;
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: #F8F9FA; }
  .btn-edit { color: #E65100; border-color: #E65100; }
  .btn-edit:hover { background: #FFF3E0; }
  .btn-edit.active { background: #E65100; color: #fff; }
  .btn-save { color: #2E7D32; border-color: #2E7D32; }
  .btn-save:hover { background: #E8F5E9; }

  .edit-indicator {
    display: none; font-size: 11px; font-weight: 700; color: #E65100;
    background: #FFF3E0; padding: 4px 10px; border-radius: 20px;
    animation: pulse 2s infinite;
  }
  .edit-indicator.visible { display: inline-flex; align-items: center; gap: 4px; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .phases { max-width: 840px; margin: 0 auto; padding: 14px 24px 40px; display: flex; flex-direction: column; gap: 12px; }

  .phase-card {
    border-radius: 12px; overflow: hidden;
    border: 1px solid #DEE2E6; background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: all 0.3s ease;
  }
  .phase-card.open { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

  .phase-header {
    display: flex; align-items: center; gap: 14px; padding: 16px 20px;
    cursor: pointer; background: #FAFAFA; transition: background 0.2s;
    user-select: none;
  }
  .phase-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .phase-meta { flex: 1; }
  .phase-meta-top { display: flex; align-items: baseline; gap: 8px; }
  .phase-num {
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .phase-name { font-size: 17px; font-weight: 700; }
  .phase-subtitle { font-size: 13px; color: #6C757D; margin-top: 2px; }
  .phase-duration {
    font-size: 11px; color: #868E96; background: #F1F3F5;
    padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap;
  }
  .phase-arrow { font-size: 18px; font-weight: 700; transition: transform 0.3s; }
  .phase-card.open .phase-arrow { transform: rotate(180deg); }

  .phase-body { padding: 0 20px 20px; display: none; }
  .phase-card.open .phase-body { display: block; }

  .section-label {
    font-size: 11px; font-weight: 700; color: #868E96;
    letter-spacing: 1.5px; margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .timeline { display: flex; flex-direction: column; margin-top: 16px; }
  .timeline-item { display: flex; gap: 12px; }
  .timeline-line { display: flex; flex-direction: column; align-items: center; width: 24px; flex-shrink: 0; }
  .timeline-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .timeline-dot.pain { box-shadow: 0 0 8px #DC354540; }
  .timeline-connector { width: 2px; flex: 1; background: #DEE2E6; min-height: 20px; }
  .timeline-content { flex: 1; padding-bottom: 14px; }
  .step-header { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .step-label { font-size: 14px; font-weight: 600; color: #212529; }
  .step-pain-badge {
    font-size: 10px; background: #FFF5F5; color: #DC3545;
    padding: 1px 7px; border-radius: 4px; font-weight: 600;
    border: 1px solid #DC354520;
  }
  .step-detail { font-size: 13px; color: #495057; margin-top: 3px; line-height: 1.5; }
  .step-actor { font-size: 11px; color: #868E96; margin-top: 3px; font-style: italic; }
  .step-keyinfo {
    margin-top: 6px; font-size: 12px; padding: 5px 10px;
    border-radius: 6px; font-weight: 500; border-left-width: 3px; border-left-style: solid;
  }

  /* Editable styles */
  [contenteditable="true"] {
    outline: none;
    border-bottom: 1px dashed #E65100;
    padding-bottom: 1px;
    transition: background 0.15s;
  }
  [contenteditable="true"]:focus {
    background: #FFF8E1;
    border-bottom-color: #E65100;
  }
  [contenteditable="true"]:hover {
    background: #FFFDE7;
  }

  .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  .tools-section { border-radius: 8px; padding: 14px; }
  .tools-current { background: #F8F9FA; }
  .tools-proposed { background: #F0F7FF; }
  .tool-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    font-weight: 500; margin-bottom: 6px;
  }
  .tool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .questions-box {
    margin-top: 18px; background: #FFFBEB; border-radius: 8px;
    padding: 14px; border: 1px solid #F59E0B30;
  }
  .questions-label {
    font-size: 11px; font-weight: 700; color: #92400E;
    letter-spacing: 1.2px; margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .question-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
  .question-item:last-child { margin-bottom: 0; }
  .question-num {
    background: #F59E0B; color: #fff; border-radius: 4px;
    min-width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .question-text { font-size: 13px; color: #78350F; line-height: 1.5; }

  /* Verified badge */
  .verified-badge {
    display: none; font-size: 10px; background: #E8F5E9; color: #2E7D32;
    padding: 1px 7px; border-radius: 4px; font-weight: 600;
    border: 1px solid #2E7D3220; cursor: pointer; margin-left: 4px;
  }
  .editing .verified-badge { display: inline-flex; align-items: center; gap: 3px; }
  .verified-badge.checked { background: #2E7D32; color: #fff; }

  .different-badge {
    display: none; font-size: 10px; background: #FFF3E0; color: #E65100;
    padding: 1px 7px; border-radius: 4px; font-weight: 600;
    border: 1px solid #E6510020; cursor: pointer; margin-left: 4px;
  }
  .editing .different-badge { display: inline-flex; align-items: center; gap: 3px; }
  .different-badge.checked { background: #E65100; color: #fff; }

  /* Notes section */
  .notes-section {
    margin-top: 14px; background: #F3E5F5; border-radius: 8px;
    padding: 14px; border: 1px solid #CE93D830;
  }
  .notes-label {
    font-size: 11px; font-weight: 700; color: #6A1B9A;
    letter-spacing: 1.2px; margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: space-between;
  }
  .note-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .note-input {
    flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif;
    border: 1px solid #CE93D860; border-radius: 6px; padding: 8px 12px;
    background: #fff; color: #4A148C; outline: none;
    resize: none; min-height: 36px;
  }
  .note-input:focus { border-color: #9C27B0; background: #FAFAFA; }
  .note-input::placeholder { color: #CE93D8; }
  .btn-add-note {
    background: #9C27B0; color: #fff; border: none; border-radius: 6px;
    padding: 0 14px; cursor: pointer; font-size: 18px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-add-note:hover { background: #7B1FA2; }
  .note-item {
    display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px;
    font-size: 13px; color: #4A148C; line-height: 1.5;
    background: #fff; padding: 6px 10px; border-radius: 6px;
    border-left: 3px solid #9C27B0;
  }
  .note-item .note-time { font-size: 10px; color: #9C27B0; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .note-item .note-text { flex: 1; }
  .note-item .note-delete {
    color: #CE93D8; cursor: pointer; font-size: 16px; flex-shrink: 0;
    opacity: 0.5; transition: opacity 0.15s;
  }
  .note-item .note-delete:hover { opacity: 1; color: #DC3545; }

  .footer-note {
    margin-top: 12px; padding: 16px; background: #fff; border-radius: 10px;
    border: 1px dashed #CED4DA; font-size: 12px; color: #6C757D; line-height: 1.6;
  }
  .footer-note strong { color: #495057; }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #2E7D32; color: #fff;
    padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 1000;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
  }
  .toast.visible { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .tools-grid { grid-template-columns: 1fr; }
    .header-title { font-size: 20px; }
    .phase-name { font-size: 15px; }
    .phase-duration { display: none; }
  }

  @media print {
    .phase-body { display: block !important; }
    .toolbar { display: none; }
    .header { position: static; }
    .phase-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #CED4DA !important; }
    .phase-arrow { display: none; }
    body { background: #fff; }
    [contenteditable] { border-bottom: none !important; }
    .verified-badge, .different-badge { display: inline-flex !important; }
    .verified-badge:not(.checked), .different-badge:not(.checked) { display: none !important; }
    .note-input-row { display: none; }
    .btn-add-note { display: none; }
    .note-delete { display: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">

    <div class="header-title">Mappatura Ciclo di Vita Evento</div>

  </div>
</div>

<div class="toolbar">

</div>

<div class="phases" id="phases"></div>
<div class="toast" id="toast"></div>

      { label: "Template chiusura contabile", detail: "Template unico Excel per tutta l'azienda → invio a Calaiò", actor: "Responsabile COM" },
      { label: "Aggiornamento Progress", detail: "Budget confermato + consuntivo + marginalità, diviso per reparto", actor: "Zaghi (TUTTE le COM)", pain: true, key: "PAIN POINT #1 — ricostruzione manuale \"da impazzire\"" },
      { label: "Aggiornamento settimanale", detail: "Prima linea commerciale aggiorna SETTIMANALMENTE", actor: "Zaghi, Candiani, Bresciani", key: "Frequenza obbligatoria (Cavecchi)" },
      { label: "Analisi Garbarino", detail: "GM verifica costi, margini, scostamenti", actor: "Garbarino" },
      { label: "Fatturazione", detail: "Ciclo attivo (al cliente) e passivo (da fornitori)", actor: "Calaiò / Commerciale" },
    ],
    tools: [
      { name: "Excel Progress (Zaghi)", status: "existing" },
      { name: "Excel Preventivo", status: "existing" },
      { name: "Template chiusura", status: "existing" },
    ],
    proposed: [
      { name: "Tally — Progress digitale pre-popolato", status: "proposed" },
      { name: "Tally — Alert dati mancanti", status: "proposed" },
      { name: "Tally — Dashboard BI Garbarino", status: "proposed" },
      { name: "Tally — Fatturazione + scadenzario", status: "proposed" },
    ],
    questions: [
      "Il template chiusura contabile è lo stesso per la tua BU?",
      "Quanto tempo per chiudere una singola COM? (semplice vs complessa)",
      "Per i progetti con 4-5 persone: come riconcili i costi? Tempo in più?",
      "Le 280 COM finiscono TUTTE nel Progress?",
      "Quanto tempo dedichi al Progress in un mese?",
      "Revolut: usate la carta aziendale? Reinserite dati manualmente?",
    ],
  },
];

const statusStyles = {
  delivered: { bg: "#D8F3DC", text: "#1B4332", dot: "#40916C" },
  wip:       { bg: "#FFF3CD", text: "#664D03", dot: "#E6A817" },
  proposed:  { bg: "#D0E2F2", text: "#1A3A5C", dot: "#3A7CA5" },
  existing:  { bg: "#E9ECEF", text: "#495057", dot: "#868E96" },
};

function renderToolBadge(t) {
  const s = statusStyles[t.status];
  return `<div class="tool-badge" style="background:${s.bg};color:${s.text};border:1px solid ${s.dot}22">
    <span class="tool-dot" style="background:${s.dot}"></span>${t.name}</div>`;
}

function renderPhase(p) {
  const stepsHtml = p.steps.map((s, i) => {
    const isLast = i === p.steps.length - 1;
    const dotBg = s.pain ? '#DC3545' : p.accent;
    const dotBorder = s.pain ? '#DC354540' : p.accent + '40';
    return `
    <div class="timeline-item">
      <div class="timeline-line">
        <div class="timeline-dot ${s.pain ? 'pain' : ''}" style="background:${dotBg};border:2px solid ${dotBorder}"></div>
        ${!isLast ? '<div class="timeline-connector"></div>' : ''}
      </div>
      <div class="timeline-content">
        <div class="step-header">
          <span class="step-label">${s.label}</span>
          ${s.pain ? '<span class="step-pain-badge">⚠ PAIN POINT</span>' : ''}
          <span class="verified-badge" onclick="this.classList.toggle('checked')" title="Confermato da Cichello">✓ Confermato</span>
          <span class="different-badge" onclick="this.classList.toggle('checked')" title="Diverso nella BU Cichello">≠ Diverso</span>
        </div>
        <div class="step-detail" data-editable="true">${s.detail}</div>
        <div class="step-actor">→ ${s.actor}</div>
        ${s.key ? `<div class="step-keyinfo" style="color:${p.color};background:${p.light};border-left-color:${p.accent}">📌 ${s.key}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const questionsHtml = p.questions.map((q, i) => `
    <div class="question-item">
      <span class="question-num">${i + 1}</span>
      <span class="question-text" data-editable="true">${q}</span>
    </div>`).join('');

  return `
  <div class="phase-card" id="phase-${p.id}" data-id="${p.id}">
    <div class="phase-header" onclick="togglePhase(${p.id})">
      <div class="phase-icon" style="background:${p.color}">${p.icon}</div>
      <div class="phase-meta">
        <div class="phase-meta-top">
          <span class="phase-num" style="color:${p.accent}">FASE ${p.id}</span>
          <span class="phase-name" style="color:${p.color}">${p.title}</span>
        </div>
        <div class="phase-subtitle">${p.subtitle}</div>
      </div>
      <div class="phase-duration">⏱ ${p.duration}</div>
      <div class="phase-arrow" style="color:${p.accent}">▾</div>
    </div>
    <div class="phase-body">
      <div class="section-label" style="margin-top:16px">STEP DEL PROCESSO</div>
      <div class="timeline">${stepsHtml}</div>

      <div class="tools-grid">
        <div class="tools-section tools-current">
          <div class="section-label">STRUMENTI ATTUALI</div>
          ${p.tools.map(renderToolBadge).join('')}
        </div>
        <div class="tools-section tools-proposed">
          <div class="section-label">PROPOSTI / IN LAVORAZIONE</div>
          ${p.proposed.map(renderToolBadge).join('')}
        </div>
      </div>

      <div class="questions-box">
        <div class="questions-label">🎯 DOMANDE PER ANTONIO CICHELLO</div>
        ${questionsHtml}
      </div>

      <div class="notes-section" id="notes-${p.id}">
        <div class="notes-label">
          <span>📝 NOTE DALLA CALL</span>
        </div>
        <div class="note-input-row">
          <textarea class="note-input" id="noteInput-${p.id}" placeholder="Scrivi una nota..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addNote(${p.id})}"></textarea>
          <button class="btn-add-note" onclick="addNote(${p.id})">+</button>
        </div>
        <div id="notesList-${p.id}"></div>
      </div>
    </div>
  </div>`;
}

// Render
document.getElementById('phases').innerHTML =
  phases.map(renderPhase).join('') +
  `<div class="footer-note">
    <strong>📝 Nota:</strong> Processo mappato dalla BU Garbarino. La BU Cichello opera in <strong>one-man-show</strong> (280 eventi, 5-6 complessi).
    Obiettivo: capire dove diverge. <br><br>
    <strong>Strumenti trasversali:</strong> Minutes 🟡 · Sally 🔵 · Crowd 🟡 (GDPR-separato)
    <br><br>
    <strong>💡 Come usare:</strong> Clicca <strong>✏️ Modifica</strong> per attivare l'editing live.
    Potrai: modificare testi, segnare step come ✓ Confermato o ≠ Diverso, aggiungere note. Poi <strong>💾 Esporta note</strong> per scaricare tutto.
  </div>`;

// Phase toggle
function togglePhase(id) {
  const card = document.getElementById('phase-' + id);
  const isOpen = card.classList.contains('open');
  const p = phases.find(x => x.id === id);
  card.classList.toggle('open');
  card.style.borderColor = isOpen ? '#DEE2E6' : p.accent;
  card.style.borderWidth = isOpen ? '1px' : '2px';
  card.querySelector('.phase-header').style.background = isOpen ? '#FAFAFA' : p.light;
}

function toggleAll() {
  allOpen = !allOpen;
  document.querySelector('.toolbar-right .btn:nth-child(2)').textContent = allOpen ? '▴ Chiudi tutto' : '▾ Espandi tutto';
  phases.forEach(p => {
    const card = document.getElementById('phase-' + p.id);
    const isOpen = card.classList.contains('open');
    if (allOpen && !isOpen) togglePhase(p.id);
    if (!allOpen && isOpen) togglePhase(p.id);
  });
}

// Edit mode
function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('btnEdit');
  const indicator = document.getElementById('editIndicator');
  
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✏️ Fine modifica' : '✏️ Modifica';
  indicator.classList.toggle('visible', editMode);
  document.body.classList.toggle('editing', editMode);
  
  document.querySelectorAll('[data-editable]').forEach(el => {
    el.contentEditable = editMode ? 'true' : 'false';
  });
}

// Notes
function addNote(phaseId) {
  const input = document.getElementById('noteInput-' + phaseId);
  const text = input.value.trim();
  if (!text) return;
  
  if (!notesData[phaseId]) notesData[phaseId] = [];
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  notesData[phaseId].push({ text, time });
  
  renderNotes(phaseId);
  input.value = '';
  input.style.height = '36px';
}

function deleteNote(phaseId, idx) {
  notesData[phaseId].splice(idx, 1);
  renderNotes(phaseId);
}

function renderNotes(phaseId) {
  const list = document.getElementById('notesList-' + phaseId);
  if (!notesData[phaseId] || notesData[phaseId].length === 0) {
    list.innerHTML = '';
    return;
  }
  list.innerHTML = notesData[phaseId].map((n, i) => `
    <div class="note-item">
      <span class="note-time">${n.time}</span>
      <span class="note-text">${n.text}</span>
      <span class="note-delete" onclick="deleteNote(${phaseId}, ${i})">×</span>
    </div>`).join('');
}

// Export
function exportNotes() {
  let md = '# Note dalla call con Antonio Cichello — ' + new Date().toLocaleDateString('it-IT') + '\n\n';
  
  // Collect verified/different badges
  phases.forEach(p => {
    const card = document.getElementById('phase-' + p.id);
    const verifiedSteps = [];
    const differentSteps = [];
    const editedDetails = [];
    
    card.querySelectorAll('.timeline-item').forEach((item, i) => {
      const v = item.querySelector('.verified-badge');
      const d = item.querySelector('.different-badge');
      const detail = item.querySelector('.step-detail');
      if (v && v.classList.contains('checked')) verifiedSteps.push(p.steps[i].label);
      if (d && d.classList.contains('checked')) differentSteps.push(p.steps[i].label);
      if (detail && detail.textContent !== p.steps[i].detail) {
        editedDetails.push({ label: p.steps[i].label, original: p.steps[i].detail, edited: detail.textContent });
      }
    });
    
    const notes = notesData[p.id] || [];
    
    if (verifiedSteps.length || differentSteps.length || notes.length || editedDetails.length) {
      md += `## Fase ${p.id} — ${p.title}\n\n`;
      if (verifiedSteps.length) {
        md += '### ✓ Confermati\n';
        verifiedSteps.forEach(s => md += `- ${s}\n`);
        md += '\n';
      }
      if (differentSteps.length) {
        md += '### ≠ Diversi nella BU Cichello\n';
        differentSteps.forEach(s => md += `- ${s}\n`);
        md += '\n';
      }
      if (editedDetails.length) {
        md += '### ✏️ Dettagli modificati\n';
        editedDetails.forEach(e => md += `- **${e.label}**: ${e.edited}\n`);
        md += '\n';
      }
      if (notes.length) {
        md += '### 📝 Note\n';
        notes.forEach(n => md += `- [${n.time}] ${n.text}\n`);
        md += '\n';
      }
    }
  });
  
  if (md.split('\n').length <= 3) {
    md += '_Nessuna nota o modifica registrata._\n';
  }
  
  // Download
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Note_Call_Cichello_' + new Date().toISOString().slice(0,10) + '.md';
  a.click();
  URL.revokeObjectURL(url);
  
  showToast('✅ Note esportate!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

// Auto-resize textareas
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('note-input')) {
    e.target.style.height = '36px';
    e.target.style.height = e.target.scrollHeight + 'px';
  }
});
</script>
